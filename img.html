<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Photos Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Memo</h1>
    <div id="fall-container"></div>

    <div class="gallery">
        <img src="img1.PNG" alt="Photo 1">
        <img src="img2.PNG" alt="Photo 2">
        <img src="img3.PNG" alt="Photo 3">
        <img src="img4.PNG" alt="Photo 4">
    </div>

    <button id="musicBtn">🎵 Play Music</button>
    <audio id="bgMusic" loop>
    <!-- Replace with your own MP3 file -->
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

btn.onclick=function(){

if(music.paused){

music.play();

btn.innerHTML="⏸ Pause Music";

}else{

music.pause();

btn.innerHTML="🎵 Play Music";

}

}


const container = document.getElementById("fall-container");

const items = [
    "❤️",
    "💖",
    "💕",
    "💗",
    "🌹",
    "🌸",
    "🌺"
];

function createFall(){

    const item = document.createElement("div");

    item.className = "fall-item";

    item.innerHTML = items[Math.floor(Math.random()*items.length)];

    item.style.left = Math.random()*100 + "vw";

    item.style.fontSize = (20 + Math.random()*30) + "px";

    item.style.animationDuration = (5 + Math.random()*5) + "s";

    item.style.opacity = Math.random();

    container.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },10000);

}

setInterval(createFall,250);



</script>
</body>
</html>
